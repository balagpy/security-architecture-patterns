services:
  api-vulnerable:
    build: ./app
    environment:
      - INSTANCE_NAME=oauth-vulnerable
      - MODE=vulnerable
      - JWT_SECRET=dev-secret-do-not-use
    ports:
      - "8301:8000"

  api-mitigated:
    build: ./app
    environment:
      - INSTANCE_NAME=oauth-mitigated
      - MODE=mitigated
      - JWT_SECRET=dev-secret-do-not-use
    ports:
      - "8302:8000"
