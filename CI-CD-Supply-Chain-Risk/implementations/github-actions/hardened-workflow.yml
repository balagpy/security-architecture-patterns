name: secure-build

on:
  push:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make build
      - name: Pin third-party action example
        uses: docker/login-action@f4ef78c080cd8d1b8b3a7f8a5f4c9e72f1b9f8e5
